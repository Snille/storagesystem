# Exempelpaket för Home Assistant
# Lägg filen i /config/packages/lagersystem.yaml
# och se till att "packages: !include_dir_named packages" finns i configuration.yaml

input_text:
  lagersystem_last_query:
    name: Lagersystem senaste fråga
    max: 255
  lagersystem_last_answer:
    name: Lagersystem senaste svar
    max: 255
  lagersystem_last_location:
    name: Lagersystem senaste plats
    max: 255
  lagersystem_last_box_id:
    name: Lagersystem senaste box-id
    max: 255
  lagersystem_last_source:
    name: Lagersystem senaste svarskälla
    max: 64
  lagersystem_last_summary:
    name: Lagersystem senaste sammanfattning
    max: 255
  lagersystem_last_keywords:
    name: Lagersystem senaste nyckelord
    max: 255

input_number:
  lagersystem_last_match_count:
    name: Lagersystem senaste antal träffar
    min: 0
    max: 25
    step: 1
    mode: box

rest_command:
  lagersystem_ask:
    url: !secret lagersystem_api_url
    method: POST
    content_type: application/json
    headers:
      x-api-key: !secret lagersystem_api_key
    payload: >-
      {{ {"query": query} | to_json }}

script:
  lagersystem_fraga:
    alias: Lagersystem - Fråga
    mode: restart
    fields:
      query:
        name: Fråga
        description: Vad letar du efter?
        example: Var finns skarvdosorna?
        required: true
        selector:
          text:
    sequence:
      - variables:
          effective_query: "{{ query | trim }}"
      - if:
          - condition: template
            value_template: "{{ effective_query == '' }}"
        then:
          - stop: Ingen fråga angavs.

      - action: rest_command.lagersystem_ask
        data:
          query: "{{ effective_query }}"
        response_variable: lagersystem_response

      - variables:
          lagersystem_payload: >-
            {% if lagersystem_response.content is mapping %}
              {{ lagersystem_response.content }}
            {% else %}
              {{ lagersystem_response.content | from_json }}
            {% endif %}
          lagersystem_answer: >-
            {% set payload = lagersystem_response.content if lagersystem_response.content is mapping else (lagersystem_response.content | from_json) %}
            {{ payload.answer | default('Jag hittade inget tydligt svar.') }}
          lagersystem_source: >-
            {% set payload = lagersystem_response.content if lagersystem_response.content is mapping else (lagersystem_response.content | from_json) %}
            {{ payload.source | default('okand') }}
          lagersystem_match_count: >-
            {% set payload = lagersystem_response.content if lagersystem_response.content is mapping else (lagersystem_response.content | from_json) %}
            {{ payload.count | default(0) | int(0) }}
          lagersystem_location: >-
            {% set payload = lagersystem_response.content if lagersystem_response.content is mapping else (lagersystem_response.content | from_json) %}
            {% if payload.matches is defined and payload.matches | count > 0 %}
              {% set match = payload.matches[0] %}
              {{ match.location.system }}, {{ match.location.shelf }}, {{ match.location.slot }}
            {% else %}
              Okänd plats
            {% endif %}
          lagersystem_box_id: >-
            {% set payload = lagersystem_response.content if lagersystem_response.content is mapping else (lagersystem_response.content | from_json) %}
            {% if payload.matches is defined and payload.matches | count > 0 %}
              {% set match = payload.matches[0] %}
              {{ match.boxId }}
            {% else %}
              okand
            {% endif %}
          lagersystem_summary: >-
            {% set payload = lagersystem_response.content if lagersystem_response.content is mapping else (lagersystem_response.content | from_json) %}
            {% if payload.matches is defined and payload.matches | count > 0 %}
              {% set match = payload.matches[0] %}
              {{ match.summary | default('') }}
            {% else %}
              {{ '' }}
            {% endif %}
          lagersystem_keywords: >-
            {% set payload = lagersystem_response.content if lagersystem_response.content is mapping else (lagersystem_response.content | from_json) %}
            {% if payload.matches is defined and payload.matches | count > 0 %}
              {% set match = payload.matches[0] %}
            {% endif %}
            {% if match is defined and match.itemKeywords is defined and match.itemKeywords is iterable %}
              {{ match.itemKeywords | join(', ') }}
            {% else %}
              {{ '' }}
            {% endif %}

      - action: input_text.set_value
        target:
          entity_id: input_text.lagersystem_last_query
        data:
          value: "{{ effective_query[:255] }}"

      - action: input_text.set_value
        target:
          entity_id: input_text.lagersystem_last_answer
        data:
          value: "{{ lagersystem_answer[:255] }}"

      - action: input_text.set_value
        target:
          entity_id: input_text.lagersystem_last_location
        data:
          value: "{{ lagersystem_location[:255] }}"

      - action: input_text.set_value
        target:
          entity_id: input_text.lagersystem_last_box_id
        data:
          value: "{{ lagersystem_box_id[:255] }}"

      - action: input_text.set_value
        target:
          entity_id: input_text.lagersystem_last_source
        data:
          value: "{{ lagersystem_source[:64] }}"

      - action: input_text.set_value
        target:
          entity_id: input_text.lagersystem_last_summary
        data:
          value: "{{ lagersystem_summary[:255] }}"

      - action: input_text.set_value
        target:
          entity_id: input_text.lagersystem_last_keywords
        data:
          value: "{{ lagersystem_keywords[:255] }}"

      - action: input_number.set_value
        target:
          entity_id: input_number.lagersystem_last_match_count
        data:
          value: "{{ lagersystem_match_count }}"

      # Byt ut entiteterna nedan mot din egen TTS- och media player-setup.
      - action: tts.speak
        target:
          entity_id: !secret lagersystem_tts_entity
        data:
          media_player_entity_id: !secret lagersystem_media_player
          message: "{{ lagersystem_answer }}"

      # Exempel på event vidare till annan automation, MQTT-bridge eller ESPHome-logik.
      - event: lagersystem_result
        event_data:
          query: "{{ effective_query }}"
          answer: "{{ lagersystem_answer }}"
          source: "{{ lagersystem_source }}"
          match_count: "{{ lagersystem_match_count }}"
          location: "{{ lagersystem_location }}"
          box_id: "{{ lagersystem_box_id }}"
          summary: "{{ lagersystem_summary }}"
          item_keywords: "{{ lagersystem_keywords }}"
          raw: "{{ lagersystem_payload }}"

template:
  - sensor:
      - name: Lagersystem senaste svar
        unique_id: lagersystem_latest_answer
        state: "{{ states('input_text.lagersystem_last_answer') }}"

      - name: Lagersystem senaste plats
        unique_id: lagersystem_latest_location
        state: "{{ states('input_text.lagersystem_last_location') }}"

      - name: Lagersystem senaste box-id
        unique_id: lagersystem_latest_box_id
        state: "{{ states('input_text.lagersystem_last_box_id') }}"

      - name: Lagersystem senaste svarskälla
        unique_id: lagersystem_latest_source
        state: "{{ states('input_text.lagersystem_last_source') }}"

      - name: Lagersystem senaste sammanfattning
        unique_id: lagersystem_latest_summary
        state: "{{ states('input_text.lagersystem_last_summary') }}"

      - name: Lagersystem senaste nyckelord
        unique_id: lagersystem_latest_keywords
        state: "{{ states('input_text.lagersystem_last_keywords') }}"

      - name: Lagersystem senaste antal träffar
        unique_id: lagersystem_latest_match_count
        state: "{{ states('input_number.lagersystem_last_match_count') | int(0) }}"
