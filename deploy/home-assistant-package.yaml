template:
  - sensor:
      - name: Lagersystem senaste svar
        unique_id: lagersystem_latest_answer
        state: "{{ states('input_text.lagersystem_last_answer') }}"

      - name: Lagersystem senaste plats
        unique_id: lagersystem_latest_location
        state: "{{ states('input_text.lagersystem_last_location') }}"

      - name: Lagersystem senaste box-id
        unique_id: lagersystem_latest_box_id
        state: "{{ states('input_text.lagersystem_last_box_id') }}"

      - name: Lagersystem senaste boxnamn
        unique_id: lagersystem_latest_label
        state: "{{ states('input_text.lagersystem_last_label') }}"

      - name: Lagersystem senaste plats-id
        unique_id: lagersystem_latest_location_id
        state: "{{ states('input_text.lagersystem_last_location_id') }}"

      - name: Lagersystem senaste session-id
        unique_id: lagersystem_latest_session_id
        state: "{{ states('input_text.lagersystem_last_session_id') }}"

      - name: Lagersystem senaste svarskälla
        unique_id: lagersystem_latest_source
        state: "{{ states('input_text.lagersystem_last_source') }}"

      - name: Lagersystem senaste sammanfattning
        unique_id: lagersystem_latest_summary
        state: "{{ states('input_text.lagersystem_last_summary') }}"

      - name: Lagersystem senaste nyckelord
        unique_id: lagersystem_latest_keywords
        state: "{{ states('input_text.lagersystem_last_keywords') }}"

      - name: Lagersystem senaste antal träffar
        unique_id: lagersystem_latest_match_count
        state: "{{ states('input_number.lagersystem_last_match_count') | int(0) }}"

      - name: Lagersystem senaste antal bilder
        unique_id: lagersystem_latest_photo_count
        state: "{{ states('input_number.lagersystem_last_photo_count') | int(0) }}"
