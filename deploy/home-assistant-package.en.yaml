# Example package for Home Assistant
# put the file in /config/packages/storagesystem/storagesystem.en.yaml
# make sure "packages: !include_dir_named packages/" is in your configuration.yaml (under the homeassistant: tag).
# Like so:
# homeassistant:
#   packages: !include_dir_named packages/

input_text:
  lagersystem_last_query:
    name: Storage System latest question
    max: 255
  lagersystem_last_search_query:
    name: Storage System latest search query
    max: 255
  lagersystem_last_answer:
    name: Storage System latest answer
    max: 255
  lagersystem_last_location:
    name: Storage System latest location
    max: 255
  lagersystem_last_location_id:
    name: Storage System latest location id
    max: 255
  lagersystem_last_box_id:
    name: Storage System latest box id
    max: 255
  lagersystem_last_label:
    name: Storage System latest box label
    max: 255
  lagersystem_last_session_id:
    name: Storage System latest session id
    max: 255
  lagersystem_last_source:
    name: Storage System latest answer source
    max: 64
  lagersystem_last_summary:
    name: Storage System latest summary
    max: 255
  lagersystem_last_keywords:
    name: Storage System latest keywords
    max: 255
  lagersystem_last_thumbnail_url:
    name: Storage System latest thumbnail
    max: 255
  lagersystem_last_original_url:
    name: Storage System latest original image
    max: 255

input_number:
  lagersystem_last_match_count:
    name: Storage System latest match count
    min: 0
    max: 25
    step: 1
    mode: box
  lagersystem_last_photo_count:
    name: Storage System latest image count
    min: 0
    max: 200
    step: 1
    mode: box

rest:
  - resource: !secret lagersystem_api_health_url
    scan_interval: 60
    headers:
      x-api-key: !secret lagersystem_api_key
    sensor:
      - name: Storage System API status
        unique_id: lagersystem_api_status
        value_template: >-
          {% if value_json is defined and value_json.ok | default(false) %}
            online
          {% else %}
            offline
          {% endif %}
      - name: Storage System API timestamp
        unique_id: lagersystem_api_timestamp
        value_template: >-
          {% if value_json is defined and value_json.date is defined %}
            {{ value_json.date }}
          {% else %}
            unavailable
          {% endif %}

rest_command:
  lagersystem_ask:
    url: !secret lagersystem_api_url
    method: POST
    content_type: application/json
    headers:
      x-api-key: !secret lagersystem_api_key
    payload: >-
      {{ {"query": query} | to_json }}
  lagersystem_search:
    url: !secret lagersystem_search_url
    method: GET
    headers:
      x-api-key: !secret lagersystem_api_key

script:
  lagersystem_fraga:
    alias: Storage System - Ask
    mode: restart
    fields:
      query:
        name: Question
        description: What are you looking for?
        example: Where are the junction boxes?
        required: true
        selector:
          text:
    sequence:
      - variables:
          effective_query: "{{ query | trim }}"
      - if:
          - condition: template
            value_template: "{{ effective_query == '' }}"
        then:
          - stop: No question was provided.

      - action: rest_command.lagersystem_ask
        data:
          query: "{{ effective_query }}"
        response_variable: lagersystem_response

      - variables:
          lagersystem_status: "{{ lagersystem_response.status | default(0) | int(0) }}"
          lagersystem_payload: >-
            {% if lagersystem_status >= 200 and lagersystem_status < 300 and lagersystem_response.content is mapping %}
              {{ lagersystem_response.content }}
            {% elif lagersystem_status >= 200 and lagersystem_status < 300 %}
              {{ lagersystem_response.content | from_json }}
            {% else %}
              {{ {"error": "api_call_failed", "status": lagersystem_status} }}
            {% endif %}
          lagersystem_answer: >-
            {% if lagersystem_status >= 200 and lagersystem_status < 300 %}
              {% set payload = lagersystem_response.content if lagersystem_response.content is mapping else (lagersystem_response.content | from_json) %}
              {{ payload.answer | default('I could not find a clear answer.') }}
            {% else %}
              I could not reach Storage System right now.
            {% endif %}
          lagersystem_source: >-
            {% if lagersystem_status >= 200 and lagersystem_status < 300 %}
              {% set payload = lagersystem_response.content if lagersystem_response.content is mapping else (lagersystem_response.content | from_json) %}
              {{ payload.source | default('unknown') }}
            {% else %}
              api_error
            {% endif %}
          lagersystem_match_count: >-
            {% if lagersystem_status >= 200 and lagersystem_status < 300 %}
              {% set payload = lagersystem_response.content if lagersystem_response.content is mapping else (lagersystem_response.content | from_json) %}
              {{ payload.count | default(0) | int(0) }}
            {% else %}
              0
            {% endif %}
          lagersystem_location: >-
            {% if lagersystem_status >= 200 and lagersystem_status < 300 %}
              {% set payload = lagersystem_response.content if lagersystem_response.content is mapping else (lagersystem_response.content | from_json) %}
              {% if payload.matches is defined and payload.matches | count > 0 %}
                {% set match = payload.matches[0] %}
                {{ match.location.system }}, {{ match.location.shelf }}, {{ match.location.slot }}
              {% else %}
                Unknown location
              {% endif %}
            {% else %}
              Unknown location
            {% endif %}
          lagersystem_box_id: >-
            {% if lagersystem_status >= 200 and lagersystem_status < 300 %}
              {% set payload = lagersystem_response.content if lagersystem_response.content is mapping else (lagersystem_response.content | from_json) %}
              {% if payload.matches is defined and payload.matches | count > 0 %}
                {% set match = payload.matches[0] %}
                {{ match.boxId }}
              {% else %}
                unknown
              {% endif %}
            {% else %}
              unknown
            {% endif %}
          lagersystem_label: >-
            {% if lagersystem_status >= 200 and lagersystem_status < 300 %}
              {% set payload = lagersystem_response.content if lagersystem_response.content is mapping else (lagersystem_response.content | from_json) %}
              {% if payload.matches is defined and payload.matches | count > 0 %}
                {% set match = payload.matches[0] %}
                {{ match.label | default('') }}
              {% else %}
                {{ '' }}
              {% endif %}
            {% else %}
              {{ '' }}
            {% endif %}
          lagersystem_location_id: >-
            {% if lagersystem_status >= 200 and lagersystem_status < 300 %}
              {% set payload = lagersystem_response.content if lagersystem_response.content is mapping else (lagersystem_response.content | from_json) %}
              {% if payload.matches is defined and payload.matches | count > 0 %}
                {% set match = payload.matches[0] %}
                {{ match.locationId | default('') }}
              {% else %}
                {{ '' }}
              {% endif %}
            {% else %}
              {{ '' }}
            {% endif %}
          lagersystem_session_id: >-
            {% if lagersystem_status >= 200 and lagersystem_status < 300 %}
              {% set payload = lagersystem_response.content if lagersystem_response.content is mapping else (lagersystem_response.content | from_json) %}
              {% if payload.matches is defined and payload.matches | count > 0 %}
                {% set match = payload.matches[0] %}
                {{ match.sessionId | default('') }}
              {% else %}
                {{ '' }}
              {% endif %}
            {% else %}
              {{ '' }}
            {% endif %}
          lagersystem_photo_count: >-
            {% if lagersystem_status >= 200 and lagersystem_status < 300 %}
              {% set payload = lagersystem_response.content if lagersystem_response.content is mapping else (lagersystem_response.content | from_json) %}
              {% if payload.matches is defined and payload.matches | count > 0 %}
                {% set match = payload.matches[0] %}
                {{ match.photos | default([]) | count }}
              {% else %}
                0
              {% endif %}
            {% else %}
              0
            {% endif %}
          lagersystem_summary: >-
            {% if lagersystem_status >= 200 and lagersystem_status < 300 %}
              {% set payload = lagersystem_response.content if lagersystem_response.content is mapping else (lagersystem_response.content | from_json) %}
              {% if payload.matches is defined and payload.matches | count > 0 %}
                {% set match = payload.matches[0] %}
                {{ match.summary | default('') }}
              {% else %}
                {{ '' }}
              {% endif %}
            {% else %}
              {{ '' }}
            {% endif %}
          lagersystem_keywords: >-
            {% if lagersystem_status >= 200 and lagersystem_status < 300 %}
              {% set payload = lagersystem_response.content if lagersystem_response.content is mapping else (lagersystem_response.content | from_json) %}
              {% if payload.matches is defined and payload.matches | count > 0 %}
                {% set match = payload.matches[0] %}
              {% endif %}
            {% endif %}
            {% if match is defined and match.itemKeywords is defined and match.itemKeywords is iterable %}
              {{ match.itemKeywords | join(', ') }}
            {% else %}
              {{ '' }}
            {% endif %}
          lagersystem_thumbnail_url: >-
            {% if lagersystem_status >= 200 and lagersystem_status < 300 %}
              {% set payload = lagersystem_response.content if lagersystem_response.content is mapping else (lagersystem_response.content | from_json) %}
              {% if payload.matches is defined and payload.matches | count > 0 %}
                {% set match = payload.matches[0] %}
                {% if match.photos is defined and match.photos | count > 0 %}
                  {{ match.photos[0].thumbnailUrl | default('') }}
                {% else %}
                  {{ '' }}
                {% endif %}
              {% else %}
                {{ '' }}
              {% endif %}
            {% else %}
              {{ '' }}
            {% endif %}
          lagersystem_original_url: >-
            {% if lagersystem_status >= 200 and lagersystem_status < 300 %}
              {% set payload = lagersystem_response.content if lagersystem_response.content is mapping else (lagersystem_response.content | from_json) %}
              {% if payload.matches is defined and payload.matches | count > 0 %}
                {% set match = payload.matches[0] %}
                {% if match.photos is defined and match.photos | count > 0 %}
                  {{ match.photos[0].originalUrl | default('') }}
                {% else %}
                  {{ '' }}
                {% endif %}
              {% else %}
                {{ '' }}
              {% endif %}
            {% else %}
              {{ '' }}
            {% endif %}

      - action: input_text.set_value
        target:
          entity_id: input_text.lagersystem_last_query
        data:
          value: "{{ effective_query[:255] }}"

      - action: input_text.set_value
        target:
          entity_id: input_text.lagersystem_last_answer
        data:
          value: "{{ lagersystem_answer[:255] }}"

      - action: input_text.set_value
        target:
          entity_id: input_text.lagersystem_last_location
        data:
          value: "{{ lagersystem_location[:255] }}"

      - action: input_text.set_value
        target:
          entity_id: input_text.lagersystem_last_box_id
        data:
          value: "{{ lagersystem_box_id[:255] }}"

      - action: input_text.set_value
        target:
          entity_id: input_text.lagersystem_last_label
        data:
          value: "{{ lagersystem_label[:255] }}"

      - action: input_text.set_value
        target:
          entity_id: input_text.lagersystem_last_location_id
        data:
          value: "{{ lagersystem_location_id[:255] }}"

      - action: input_text.set_value
        target:
          entity_id: input_text.lagersystem_last_session_id
        data:
          value: "{{ lagersystem_session_id[:255] }}"

      - action: input_text.set_value
        target:
          entity_id: input_text.lagersystem_last_source
        data:
          value: "{{ lagersystem_source[:64] }}"

      - action: input_text.set_value
        target:
          entity_id: input_text.lagersystem_last_summary
        data:
          value: "{{ lagersystem_summary[:255] }}"

      - action: input_text.set_value
        target:
          entity_id: input_text.lagersystem_last_keywords
        data:
          value: "{{ lagersystem_keywords[:255] }}"

      - action: input_text.set_value
        target:
          entity_id: input_text.lagersystem_last_thumbnail_url
        data:
          value: "{{ lagersystem_thumbnail_url[:255] }}"

      - action: input_text.set_value
        target:
          entity_id: input_text.lagersystem_last_original_url
        data:
          value: "{{ lagersystem_original_url[:255] }}"

      - action: input_number.set_value
        target:
          entity_id: input_number.lagersystem_last_match_count
        data:
          value: "{{ lagersystem_match_count }}"

      - action: input_number.set_value
        target:
          entity_id: input_number.lagersystem_last_photo_count
        data:
          value: "{{ lagersystem_photo_count }}"

      # Replace the entities below with your own TTS and media player setup.
      - action: tts.speak
        target:
          entity_id: !secret lagersystem_tts_entity
        data:
          media_player_entity_id: !secret lagersystem_media_player
          message: "{{ lagersystem_answer }}"

      # Example event forwarding to another automation, MQTT bridge, or ESPHome logic.
      - event: lagersystem_result
        event_data:
          query: "{{ effective_query }}"
          answer: "{{ lagersystem_answer }}"
          source: "{{ lagersystem_source }}"
          match_count: "{{ lagersystem_match_count }}"
          location: "{{ lagersystem_location }}"
          location_id: "{{ lagersystem_location_id }}"
          box_id: "{{ lagersystem_box_id }}"
          label: "{{ lagersystem_label }}"
          session_id: "{{ lagersystem_session_id }}"
          photo_count: "{{ lagersystem_photo_count }}"
          summary: "{{ lagersystem_summary }}"
          item_keywords: "{{ lagersystem_keywords }}"
          thumbnail_url: "{{ lagersystem_thumbnail_url }}"
          original_url: "{{ lagersystem_original_url }}"
          raw: "{{ lagersystem_payload }}"

  lagersystem_sok:
    alias: Storage System - Search
    mode: restart
    fields:
      query:
        name: Search query
        description: What do you want to search for?
        example: junction box
        required: true
        selector:
          text:
    sequence:
      - variables:
          effective_query: "{{ query | trim }}"
      - if:
          - condition: template
            value_template: "{{ effective_query == '' }}"
        then:
          - stop: No search query was provided.

      - action: rest_command.lagersystem_search
        data:
          query: "{{ effective_query | urlencode }}"
        response_variable: lagersystem_response

      - variables:
          lagersystem_status: "{{ lagersystem_response.status | default(0) | int(0) }}"
          lagersystem_payload: >-
            {% if lagersystem_status >= 200 and lagersystem_status < 300 and lagersystem_response.content is mapping %}
              {{ lagersystem_response.content }}
            {% elif lagersystem_status >= 200 and lagersystem_status < 300 %}
              {{ lagersystem_response.content | from_json }}
            {% else %}
              {{ {"error": "api_call_failed", "status": lagersystem_status} }}
            {% endif %}
          lagersystem_match_count: >-
            {% if lagersystem_status >= 200 and lagersystem_status < 300 %}
              {% set payload = lagersystem_response.content if lagersystem_response.content is mapping else (lagersystem_response.content | from_json) %}
              {{ payload.count | default(0) | int(0) }}
            {% else %}
              0
            {% endif %}
          lagersystem_answer: >-
            {% if lagersystem_status >= 200 and lagersystem_status < 300 %}
              {% set payload = lagersystem_response.content if lagersystem_response.content is mapping else (lagersystem_response.content | from_json) %}
              {% if payload.matches is defined and payload.matches | count > 0 %}
                {% set match = payload.matches[0] %}
                {{ match.label | default('Unknown box') }} in {{ match.location.system | default('Unknown location') }}, {{ match.location.shelf | default('') }}, {{ match.location.slot | default('') }}
              {% else %}
                I could not find any clear matches.
              {% endif %}
            {% else %}
              I could not reach Storage System right now.
            {% endif %}
          lagersystem_source: search
          lagersystem_location: >-
            {% if lagersystem_status >= 200 and lagersystem_status < 300 %}
              {% set payload = lagersystem_response.content if lagersystem_response.content is mapping else (lagersystem_response.content | from_json) %}
              {% if payload.matches is defined and payload.matches | count > 0 %}
                {% set match = payload.matches[0] %}
                {{ match.location.system }}, {{ match.location.shelf }}, {{ match.location.slot }}
              {% else %}
                Unknown location
              {% endif %}
            {% else %}
              Unknown location
            {% endif %}
          lagersystem_box_id: >-
            {% if lagersystem_status >= 200 and lagersystem_status < 300 %}
              {% set payload = lagersystem_response.content if lagersystem_response.content is mapping else (lagersystem_response.content | from_json) %}
              {% if payload.matches is defined and payload.matches | count > 0 %}
                {% set match = payload.matches[0] %}
                {{ match.boxId | default('unknown') }}
              {% else %}
                unknown
              {% endif %}
            {% else %}
              unknown
            {% endif %}
          lagersystem_label: >-
            {% if lagersystem_status >= 200 and lagersystem_status < 300 %}
              {% set payload = lagersystem_response.content if lagersystem_response.content is mapping else (lagersystem_response.content | from_json) %}
              {% if payload.matches is defined and payload.matches | count > 0 %}
                {% set match = payload.matches[0] %}
                {{ match.label | default('') }}
              {% else %}
                {{ '' }}
              {% endif %}
            {% else %}
              {{ '' }}
            {% endif %}
          lagersystem_location_id: >-
            {% if lagersystem_status >= 200 and lagersystem_status < 300 %}
              {% set payload = lagersystem_response.content if lagersystem_response.content is mapping else (lagersystem_response.content | from_json) %}
              {% if payload.matches is defined and payload.matches | count > 0 %}
                {% set match = payload.matches[0] %}
                {{ match.locationId | default('') }}
              {% else %}
                {{ '' }}
              {% endif %}
            {% else %}
              {{ '' }}
            {% endif %}
          lagersystem_session_id: >-
            {% if lagersystem_status >= 200 and lagersystem_status < 300 %}
              {% set payload = lagersystem_response.content if lagersystem_response.content is mapping else (lagersystem_response.content | from_json) %}
              {% if payload.matches is defined and payload.matches | count > 0 %}
                {% set match = payload.matches[0] %}
                {{ match.sessionId | default('') }}
              {% else %}
                {{ '' }}
              {% endif %}
            {% else %}
              {{ '' }}
            {% endif %}
          lagersystem_photo_count: >-
            {% if lagersystem_status >= 200 and lagersystem_status < 300 %}
              {% set payload = lagersystem_response.content if lagersystem_response.content is mapping else (lagersystem_response.content | from_json) %}
              {% if payload.matches is defined and payload.matches | count > 0 %}
                {% set match = payload.matches[0] %}
                {{ match.photos | default([]) | count }}
              {% else %}
                0
              {% endif %}
            {% else %}
