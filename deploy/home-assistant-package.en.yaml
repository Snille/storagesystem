            {% endif %}
          lagersystem_keywords: >-
            {% if lagersystem_status >= 200 and lagersystem_status < 300 %}
              {% set payload = lagersystem_response.content if lagersystem_response.content is mapping else (lagersystem_response.content | from_json) %}
              {% if payload.matches is defined and payload.matches | count > 0 %}
                {% set match = payload.matches[0] %}
              {% endif %}
            {% endif %}
            {% if match is defined and match.itemKeywords is defined and match.itemKeywords is iterable %}
              {{ match.itemKeywords | join(', ') }}
            {% else %}
              {{ '' }}
            {% endif %}
          lagersystem_thumbnail_url: >-
            {% if lagersystem_status >= 200 and lagersystem_status < 300 %}
              {% set payload = lagersystem_response.content if lagersystem_response.content is mapping else (lagersystem_response.content | from_json) %}
              {% if payload.matches is defined and payload.matches | count > 0 %}
                {% set match = payload.matches[0] %}
                {% if match.photos is defined and match.photos | count > 0 %}
